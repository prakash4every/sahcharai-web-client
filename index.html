<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SahcharAI - Web Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: #4a148c;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title h1 { font-size: 1.3rem; }
        .header-title p { font-size: 0.7rem; opacity: 0.9; }
        .bot-selector {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .image-message {
            max-width: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        .typing-indicator {
            background: white;
            padding: 12px 16px;
            border-radius: 20px;
            align-self: flex-start;
            display: none;
            gap: 4px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }

        /* Input Area */
        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
            flex-wrap: wrap;
        }
        .input-row {
            display: flex;
            width: 100%;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 1rem;
            outline: none;
        }
        .input-row input:focus { border-color: #667eea; }
        .btn-send {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 28px;
            cursor: pointer;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .action-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover { background: #e0e0e0; }

        /* Modal for Image Generation */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.65rem;
            color: #888;
            background: white;
            border-top: 1px solid #eee;
        }
        @media (max-width: 500px) {
            .chat-header { flex-direction: column; text-align: center; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header">
            <div class="header-title">
                <h1>🤖 SahcharAI</h1>
                <p>वेब असिस्टेंट</p>
            </div>
            <div class="bot-selector" id="botSelector">
                <span>🤖</span> SahcharAI <span>▼</span>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="message bot-message">नमस्ते! मैं SahcharAI हूँ। आपकी कैसे मदद कर सकता हूँ? 🙏</div>
        </div>

        <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="अपना सवाल लिखें..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()">भेजें</button>
            </div>
            <div class="action-buttons">
                <button class="action-btn" onclick="showImageGenModal()">🎨 इमेज बनाएं</button>
                <button class="action-btn" onclick="document.getElementById('imageUpload').click()">📷 फोटो विश्लेषण</button>
                <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="analyzeImage(this.files[0])">
            </div>
        </div>

        <div class="footer">
            राम प्रकाश कुमार द्वारा निर्मित | बैकएंड: सहचर AI v3.3
        </div>
    </div>

    <!-- Bot Selection Modal -->
    <div class="modal" id="botModal">
        <div class="modal-content">
            <h3>बॉट चुनें</h3>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SahcharAI')">🤖 SahcharAI</button>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SahcharAssistant')">👨‍💼 SahcharAssistant</button>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SuperSahchar')">⭐ SuperSahchar</button>
            <div class="modal-buttons"><button onclick="closeBotModal()">बंद करें</button></div>
        </div>
    </div>

    <!-- Image Generation Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <h3>🎨 इमेज बनाएं</h3>
            <input type="text" id="imagePrompt" placeholder="तस्वीर का विवरण लिखें...">
            <div class="modal-buttons">
                <button onclick="generateImage()">बनाएं</button>
                <button onclick="closeImageModal()">रद्द करें</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const API_URL = 'https://sahchar-ai-backend.onrender.com';
        let currentBot = 'SahcharAI';
        let sessionId = localStorage.getItem('session_id') || crypto.randomUUID();
        localStorage.setItem('session_id', sessionId);

        // DOM Elements
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const typingDiv = document.getElementById('typing');

        // Helper Functions
        function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
        function showTyping(show) { typingDiv.style.display = show ? 'flex' : 'none'; scrollToBottom(); }
        
        function addMessage(text, isUser, isImage = false, imageUrl = null) {
            const msgDiv = document.createElement('div');
            if (isImage) {
                msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                const img = document.createElement('img');
                img.src = imageUrl;
                img.style.maxWidth = '200px';
                img.style.borderRadius = '12px';
                img.style.cursor = 'pointer';
                img.onclick = () => window.open(imageUrl, '_blank');
                msgDiv.appendChild(img);
            } else {
                msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                msgDiv.textContent = text;
            }
            messagesDiv.appendChild(msgDiv);
            scrollToBottom();
        }

        // ========== CHAT MESSAGE ==========
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            showTyping(true);
            
            try {
                const endpoint = currentBot === 'SahcharAssistant' ? '/chat-assistant' : 
                               (currentBot === 'SuperSahchar' ? '/chat-nvidia' : '/chat');
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                    body: JSON.stringify({ message: text, sessionId: sessionId, bot: currentBot })
                });
                const data = await response.json();
                showTyping(false);
                const reply = data.reply || data.message || "क्षमा करें, मैं उत्तर नहीं दे पाया। 🙏";
                addMessage(reply, false);
            } catch (error) {
                showTyping(false);
                addMessage("❌ नेटवर्क त्रुटि! कृपया पुनः प्रयास करें। 🙏", false);
            }
        }
        function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }

        // ========== IMAGE GENERATION ==========
        function showImageGenModal() { document.getElementById('imageModal').style.display = 'flex'; }
        function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }
        
        async function generateImage() {
            const prompt = document.getElementById('imagePrompt').value.trim();
            if (!prompt) { alert('कृपया प्रॉम्प्ट लिखें'); return; }
            closeImageModal();
            addMessage(`🎨 ${prompt}`, true);
            showTyping(true);
            
            try {
                const response = await fetch(API_URL + '/api/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                showTyping(false);
                if (data.imageUrl) {
                    addMessage('ये रही आपकी इमेज:', false);
                    addMessage('', false, true, data.imageUrl);
                } else {
                    addMessage('❌ इमेज बनाने में समस्या आई।', false);
                }
            } catch (error) {
                showTyping(false);
                addMessage('❌ Error: ' + error.message, false);
            }
            document.getElementById('imagePrompt').value = '';
        }

        // ========== IMAGE ANALYSIS ==========
        async function analyzeImage(file) {
            if (!file) return;
            addMessage('📷 [फोटो अपलोड हुआ]', true);
            showTyping(true);
            
            const formData = new FormData();
            formData.append('image', file);
            formData.append('message', 'इस फोटो के बारे में बताएं');
            
            try {
                const response = await fetch(API_URL + '/api/analyze-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                showTyping(false);
                const analysis = data.analysis || '✅ फोटो विश्लेषण पूरा हुआ!';
                addMessage(analysis, false);
            } catch (error) {
                showTyping(false);
                addMessage('❌ फोटो विश्लेषण में समस्या आई।', false);
            }
        }

        // ========== BOT SWITCHING ==========
        function showBotSelector() { document.getElementById('botModal').style.display = 'flex'; }
        function closeBotModal() { document.getElementById('botModal').style.display = 'none'; }
        
        function switchBot(botName) {
            currentBot = botName;
            document.getElementById('botSelector').innerHTML = botName === 'SahcharAI' ? '🤖 SahcharAI ▼' :
                                                              (botName === 'SahcharAssistant' ? '👨‍💼 SahcharAssistant ▼' : '⭐ SuperSahchar ▼');
            closeBotModal();
            addMessage(`नमस्ते! मैं ${botName} हूँ। आपकी सेवा में हमेशा तत्पर। 🙏`, false);
        }
        
        document.getElementById('botSelector').onclick = showBotSelector;
    </script>
</body>
</html>
