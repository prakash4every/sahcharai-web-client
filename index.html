<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SahcharAI - Web Assistant with Voice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4a148c;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title h1 { font-size: 1.3rem; }
        .header-title p { font-size: 0.7rem; opacity: 0.9; }
        .bot-selector {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .speaker-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .speaker-btn.active { background: #4caf50; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }
        .user-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .speak-icon {
            position: absolute;
            bottom: 4px;
            right: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .speak-icon:hover { opacity: 1; }
        .image-message {
            max-width: 250px;
            max-height: 250px;
            border-radius: 12px;
            cursor: pointer;
            margin: 5px 0;
        }
        .image-preview {
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }
        .typing-indicator {
            background: white;
            padding: 12px 16px;
            border-radius: 20px;
            align-self: flex-start;
            display: none;
            gap: 4px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 8px;
            flex-wrap: wrap;
        }
        .input-row { display: flex; width: 100%; gap: 8px; }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            font-size: 1rem;
            outline: none;
        }
        .input-row input:focus { border-color: #667eea; }
        .btn-send {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 28px;
            cursor: pointer;
        }
        .action-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .action-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover { background: #e0e0e0; }
        .mic-btn { background: #4a148c; color: white; }
        .mic-btn:hover { background: #6a1b9a; }
        .mic-btn.listening { background: #4caf50; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 8px;
            font-size: 0.65rem;
            color: #888;
            background: white;
            border-top: 1px solid #eee;
        }
        @media (max-width: 500px) {
            .chat-header { flex-direction: column; text-align: center; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header">
            <div class="header-title">
                <h1>🤖 SahcharAI</h1>
                <p>वेब असिस्टेंट</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="speaker-btn" id="globalSpeaker" onclick="toggleAutoSpeak()" title="ऑटो बोलें">🔊</button>
                <div class="bot-selector" id="botSelector">
                    <span>🤖</span> SahcharAI <span>▼</span>
                </div>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="message bot-message">नमस्ते! मैं SahcharAI हूँ। आपकी कैसे मदद कर सकता हूँ? 🙏</div>
        </div>

        <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="अपना सवाल लिखें..." onkeypress="handleKeyPress(event)">
                <button class="btn-send" onclick="sendMessage()">भेजें</button>
            </div>
            <div class="action-buttons">
                <button class="action-btn mic-btn" id="micBtn" onclick="startVoiceInput()">🎤 बोलें</button>
                <button class="action-btn" onclick="showImageGenModal()">🎨 इमेज बनाएं</button>
                <button class="action-btn" id="photoAnalysisBtn" onclick="selectImageForAnalysis()">📷 फोटो विश्लेषण</button>
                <input type="file" id="imageUpload" accept="image/*" style="display:none">
            </div>
        </div>

        <div class="footer">
            राम प्रकाश कुमार द्वारा निर्मित | 🔊 बोलने के लिए टेक्स्ट पर क्लिक करें
        </div>
    </div>

    <!-- Bot Selection Modal -->
    <div class="modal" id="botModal">
        <div class="modal-content">
            <h3>बॉट चुनें</h3>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SahcharAI')">🤖 SahcharAI</button>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SahcharAssistant')">👨‍💼 SahcharAssistant</button>
            <button class="action-btn" style="width:100%; margin:5px 0" onclick="switchBot('SuperSahchar')">⭐ SuperSahchar</button>
            <div class="modal-buttons"><button onclick="closeBotModal()">बंद करें</button></div>
        </div>
    </div>

    <!-- Image Generation Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <h3>🎨 इमेज बनाएं</h3>
            <input type="text" id="imagePrompt" placeholder="तस्वीर का विवरण लिखें...">
            <div class="modal-buttons">
                <button onclick="generateImage()">बनाएं</button>
                <button onclick="closeImageModal()">रद्द करें</button>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        // 🔥 NEW: Firebase Backend URL (Primary)
        const FIREBASE_API_URL = 'https://api-5n6fh3d24a-uc.a.run.app';
        // 🎙️ Legacy Render URL (fallback or if needed)
        const RENDER_API_URL = 'https://sahchar-ai-backend.onrender.com';
        
        // Use Firebase URL as primary
        const API_URL = FIREBASE_API_URL;
        
        let currentBot = 'SahcharAI';
        
        // Generate unique session ID (persistent across page reloads)
        let sessionId = localStorage.getItem('session_id');
        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem('session_id', sessionId);
            console.log('🆕 New session created:', sessionId.substring(0, 8) + '...');
        } else {
            console.log('🔄 Existing session:', sessionId.substring(0, 8) + '...');
        }
        
        let autoSpeak = true;
        let speechSynthesis = window.speechSynthesis;
        let currentUtterance = null;
        let pendingImageFile = null;
        let isRecognizing = false;

        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const typingDiv = document.getElementById('typing');

        // ========== TEXT TO SPEECH ==========
        function speakText(text) {
            if (!autoSpeak) return;
            if (!text || text.length === 0) return;
            
            let cleanText = text.replace(/[^\u0900-\u097F\sa-zA-Z0-9,।?.!]/g, '');
            cleanText = cleanText.replace(/\*/g, '').trim();
            if (cleanText.length === 0) return;
            
            if (currentUtterance) {
                try { speechSynthesis.cancel(); } catch(e) {}
                currentUtterance = null;
            }
            
            currentUtterance = new SpeechSynthesisUtterance(cleanText);
            currentUtterance.lang = 'hi-IN';
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1.0;
            currentUtterance.volume = 1.0;
            
            try {
                const voices = speechSynthesis.getVoices();
                const hindiVoice = voices.find(v => v.lang === 'hi-IN' || v.lang.startsWith('hi'));
                if (hindiVoice) currentUtterance.voice = hindiVoice;
            } catch(e) {}
            
            currentUtterance.onend = () => { currentUtterance = null; };
            currentUtterance.onerror = () => { currentUtterance = null; };
            
            try { speechSynthesis.speak(currentUtterance); } catch(e) {}
        }
        
        function toggleAutoSpeak() {
            autoSpeak = !autoSpeak;
            const btn = document.getElementById('globalSpeaker');
            btn.innerHTML = autoSpeak ? '🔊' : '🔇';
            btn.style.background = autoSpeak ? '#4caf50' : 'rgba(255,255,255,0.2)';
        }
        
        function speakSpecificMessage(text) {
            const oldAutoSpeak = autoSpeak;
            autoSpeak = true;
            speakText(text);
            autoSpeak = oldAutoSpeak;
        }

        // ========== VOICE INPUT ==========
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecognizing = true;
                const micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '🎤 सुन रहा हूँ...';
                micBtn.classList.add('listening');
            };
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                if (transcript && transcript.trim().length > 0) {
                    userInput.value = transcript;
                    sendMessage();
                }
                recognition.stop();
            };
            
            recognition.onerror = () => {
                const micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '🎤 बोलें';
                micBtn.classList.remove('listening');
                isRecognizing = false;
            };
            
            recognition.onend = () => {
                const micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '🎤 बोलें';
                micBtn.classList.remove('listening');
                isRecognizing = false;
            };
        }
        
        function startVoiceInput() {
            if (!recognition) {
                alert('Chrome browser use करें।');
                return;
            }
            if (isRecognizing) {
                recognition.stop();
                setTimeout(() => recognition.start(), 200);
                return;
            }
            try {
                userInput.value = '';
                recognition.start();
            } catch (e) {}
        }

        // ========== HELPER FUNCTIONS ==========
        function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
        function showTyping(show) { typingDiv.style.display = show ? 'flex' : 'none'; scrollToBottom(); }
        
        function displayImage(imageUrl, container) {
            const img = document.createElement('img');
            img.src = imageUrl;
            img.className = 'image-message';
            img.onclick = () => window.open(imageUrl, '_blank');
            img.onerror = () => {
                console.log('Image load failed, trying fallback');
                img.src = `https://placehold.co/1024x1024/4CAF50/white?text=${encodeURIComponent('Image')}`;
            };
            container.appendChild(img);
        }
        
        function addMessage(text, isUser, isImage = false, imageUrl = null, isImagePreview = false, previewData = null) {
            const msgDiv = document.createElement('div');
            if (isImage) {
                msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                displayImage(imageUrl, msgDiv);
            } else if (isImagePreview && previewData) {
                msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                const img = document.createElement('img');
                img.src = previewData;
                img.className = 'image-preview';
                img.onclick = () => window.open(previewData, '_blank');
                msgDiv.appendChild(img);
                const caption = document.createElement('div');
                caption.style.fontSize = '0.7rem';
                caption.style.marginTop = '4px';
                caption.style.opacity = '0.7';
                caption.textContent = text;
                msgDiv.appendChild(caption);
            } else {
                msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                msgDiv.textContent = text;
                
                if (!isUser) {
                    const speakerIcon = document.createElement('span');
                    speakerIcon.className = 'speak-icon';
                    speakerIcon.innerHTML = '🔊';
                    speakerIcon.onclick = (e) => {
                        e.stopPropagation();
                        speakSpecificMessage(text);
                    };
                    msgDiv.appendChild(speakerIcon);
                    
                    if (autoSpeak) {
                        setTimeout(() => speakText(text), 100);
                    }
                }
            }
            messagesDiv.appendChild(msgDiv);
            scrollToBottom();
        }

        // ========== IMAGE ANALYSIS ==========
        function selectImageForAnalysis() {
            const fileInput = document.getElementById('imageUpload');
            fileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    pendingImageFile = file;
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        addMessage('📷 फोटो चयनित:', true, false, null, true, event.target.result);
                        userInput.focus();
                        userInput.placeholder = "इस फोटो के बारे में क्या जानना चाहते हैं? लिखें...";
                        addMessage('✅ फोटो अपलोड हो गई। अब लिखकर भेजें।', false);
                    };
                    reader.readAsDataURL(file);
                }
                fileInput.value = '';
            };
            fileInput.click();
        }
        
        async function sendImageForAnalysis() {
            if (!pendingImageFile) return false;
            const userQuestion = userInput.value.trim();
            if (!userQuestion) {
                addMessage('❌ कृपया सवाल लिखें।', false);
                return false;
            }
            addMessage(userQuestion, true);
            userInput.value = '';
            showTyping(true);
            
            const formData = new FormData();
            formData.append('image', pendingImageFile);
            formData.append('message', userQuestion);
            formData.append('bot', currentBot);
            formData.append('sessionId', sessionId);
            
            try {
                const response = await fetch(API_URL + '/api/analyze-image', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                showTyping(false);
                const analysis = data.analysis || '✅ विश्लेषण पूरा हुआ!';
                addMessage(analysis, false);
                pendingImageFile = null;
                userInput.placeholder = "अपना सवाल लिखें...";
                return true;
            } catch (error) {
                showTyping(false);
                addMessage('❌ त्रुटि। पुनः प्रयास करें।', false);
                return false;
            }
        }

        // ========== CHAT MESSAGE (WITH SESSION ID) ==========
        async function sendMessage() {
            if (pendingImageFile) {
                await sendImageForAnalysis();
                return;
            }
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            showTyping(true);
            
            try {
                let endpoint;
                switch(currentBot) {
                    case 'SahcharAssistant':
                        endpoint = '/chat-assistant';
                        break;
                    case 'SuperSahchar':
                        endpoint = '/chat-nvidia';
                        break;
                    default:
                        endpoint = '/chat';
                }
                
                const response = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({ 
                        message: text, 
                        sessionId: sessionId, 
                        bot: currentBot 
                    })
                });
                const data = await response.json();
                showTyping(false);
                const reply = data.reply || data.message || "क्षमा करें, उत्तर नहीं मिला। 🙏";
                addMessage(reply, false);
            } catch (error) {
                showTyping(false);
                addMessage("❌ नेटवर्क त्रुटि! पुनः प्रयास करें। 🙏", false);
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // ========== IMAGE GENERATION (with Firebase) ==========
        function showImageGenModal() { document.getElementById('imageModal').style.display = 'flex'; }
        function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }
        
        async function generateImage() {
            const prompt = document.getElementById('imagePrompt').value.trim();
            if (!prompt) { alert('प्रॉम्प्ट लिखें'); return; }
            closeImageModal();
            addMessage(`🎨 ${prompt}`, true);
            showTyping(true);
            
            try {
                const response = await fetch(API_URL + '/api/image/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                showTyping(false);
                if (data.imageUrl) {
                    addMessage('ये रही इमेज:', false);
                    addMessage('', false, true, data.imageUrl);
                } else {
                    addMessage('❌ इमेज नहीं बन पाई।', false);
                }
            } catch (error) {
                showTyping(false);
                addMessage('❌ Error: ' + error.message, false);
            }
            document.getElementById('imagePrompt').value = '';
        }

        // ========== BOT SWITCHING ==========
        function showBotSelector() { document.getElementById('botModal').style.display = 'flex'; }
        function closeBotModal() { document.getElementById('botModal').style.display = 'none'; }
        
        function switchBot(botName) {
            currentBot = botName;
            const botSelector = document.getElementById('botSelector');
            if (botName === 'SahcharAI') botSelector.innerHTML = '🤖 SahcharAI ▼';
            else if (botName === 'SahcharAssistant') botSelector.innerHTML = '👨‍💼 SahcharAssistant ▼';
            else botSelector.innerHTML = '⭐ SuperSahchar ▼';
            closeBotModal();
            addMessage(`नमस्ते! मैं ${botName} हूँ। 🙏`, false);
        }
        
        document.getElementById('botSelector').onclick = showBotSelector;
        
        // Log session info on load
        console.log('🌐 Web Client with Firebase Backend');
        console.log('📡 API URL:', API_URL);
        console.log('🆔 Session ID:', sessionId.substring(0, 8) + '...');
        
        // Preload TTS voices
        setTimeout(() => { speakText('नमस्ते'); }, 1000);
    </script>
</body>
</html>
